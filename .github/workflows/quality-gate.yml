name: Quality Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npm run typecheck --if-present

  # ── Playwright E2E ────────────────────────────────────────────
  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Comment PR with test results
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            let summary = '✅ Playwright: todos os testes passaram.';
            try {
              const results = JSON.parse(fs.readFileSync('test-results/.last-run.json', 'utf8'));
              const { passed, failed, skipped } = results;
              if (failed > 0) {
                summary = `❌ Playwright: **${failed} falha(s)** · ${passed} passou · ${skipped} pulado`;
              } else {
                summary = `✅ Playwright: **${passed}/${passed + skipped} testes passando**`;
              }
            } catch {}
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🛡️ Quality Gate\n\n${summary}\n\n[Ver relatório completo](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });

  # ── Coverage Badge (opcional) ─────────────────────────────────
  badge:
    name: Update Coverage Badge
    runs-on: ubuntu-latest
    needs: playwright
    if: github.ref == 'refs/heads/main' && success()
    steps:
      - uses: actions/checkout@v4
      - name: Extract pass rate
        id: rate
        run: |
          PASSED=$(cat playwright-report/index.html 2>/dev/null | grep -oP '\d+ passed' | grep -oP '\d+' | head -1 || echo "0")
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
      - name: Update README badge
        run: |
          echo "Badge updated: ${{ steps.rate.outputs.passed }} tests passing"
